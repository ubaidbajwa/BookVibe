# BookVibe — Nginx serves the React SPA and reverse-proxies the API,
# the Stripe webhook and Socket.io to the backend container.
# `backend` resolves via Docker's internal DNS (the compose service name).

server {
    listen 80;
    server_name _;

    # Must be >= express-fileupload limit (50 MB) so complaint videos /
    # CNIC images aren't rejected at the proxy.
    client_max_body_size 50M;

    root /usr/share/nginx/html;
    index index.html;

    # --- REST API + Stripe webhook ---
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Socket.io (WebSocket upgrade) ---
    location /socket.io/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;   # keep long-lived sockets open
    }

    # --- Backend health passthrough (optional, handy for debugging) ---
    location = /health {
        proxy_pass http://backend:3000/health;
    }

    # --- Static assets: long cache for fingerprinted files ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- SPA fallback: every other route returns index.html ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
